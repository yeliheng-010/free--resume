services:
  deps:
    image: node:20-alpine
    container_name: free-resume-builder-deps
    working_dir: /app
    dns:
      - 223.5.5.5
      - 114.114.114.114
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - npm_cache:/root/.npm
    environment:
      - NPM_CONFIG_REGISTRY=https://mirrors.cloud.tencent.com/npm/
    command: >
      sh -lc "
      LOCK_HASH=$$(sha256sum package-lock.json | awk '{print $$1}');
      INSTALLED_HASH=$$(cat node_modules/.package-lock.hash 2>/dev/null || true);
      if [ ! -x node_modules/.bin/next ] || [ \"$$LOCK_HASH\" != \"$$INSTALLED_HASH\" ]; then
        npm ci --no-fund --no-audit &&
        printf '%s' \"$$LOCK_HASH\" > node_modules/.package-lock.hash;
      else
        echo 'Dependencies already up to date.';
      fi"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: free-resume-builder
    depends_on:
      deps:
        condition: service_completed_successfully
    dns:
      - 223.5.5.5
      - 114.114.114.114
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NPM_CONFIG_REGISTRY=https://mirrors.cloud.tencent.com/npm/
    command: npm run dev -- -H 0.0.0.0 -p 3000

volumes:
  node_modules:
  npm_cache:
